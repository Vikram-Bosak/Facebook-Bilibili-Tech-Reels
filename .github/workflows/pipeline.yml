name: Facebook Bilibili Tech Reels

on:
  push:
    branches:
      - main
  schedule:
    # 6 runs/day — 1 video per run
    # UTC: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    name: Bilibili Tech Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: bilibili-tech-pipeline
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run Bilibili Tech Pipeline
        id: main_agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Starting Bilibili Tech Pipeline..."
          python main_agent.py

      - name: Commit updated files
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add downloaded_history.txt || true
          git add workspace/queue.json || true
          git add workspace/reels_feed.xml || true
          git commit -m "Update download history" || true
          git pull --rebase origin main || true
          git push origin main || true
